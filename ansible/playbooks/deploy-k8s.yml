---
# ============================================================
# Playbook: deploy-k8s.yml
# Purpose:  Deploy the Turf Booking Platform microservices
#           using Kubernetes (Kustomize) via Ansible.
# Usage:    ansible-playbook ansible/playbooks/deploy-k8s.yml
# ============================================================

- name: Deploy Turf Booking Platform to Kubernetes
  hosts: localhost
  connection: local
  become: false

  vars:
    app_dir: "~/turf-booking-k8s"

  tasks:
    # ------- Prepare App Directory -------
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    # ------- Copy Deployment Files -------
    - name: Copy k8s directory to remote host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../k8s"
        dest: "{{ app_dir }}/"
        mode: "0644"

    - name: Copy environment file to remote host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../.env"
        dest: "{{ app_dir }}/.env"
        mode: "0600"

    # ------- Deploy Core Services to Kubernetes -------
    - name: Apply Kubernetes manifests using Kustomize
      ansible.builtin.command: kubectl apply -k {{ app_dir }}/k8s/
      register: k8s_deploy_result
      changed_when: "'created' in k8s_deploy_result.stdout or 'configured' in k8s_deploy_result.stdout"

    # ------- Deploy Monitoring Stack -------
    - name: Deploy Monitoring Stack (Prometheus & Grafana)
      ansible.builtin.command: kubectl apply -f {{ app_dir }}/k8s/monitoring/monitoring.yaml
      register: monitoring_result
      changed_when: "'created' in monitoring_result.stdout or 'configured' in monitoring_result.stdout"

    # ------- Deploy Logging Stack -------
    - name: Deploy Logging Namespace
      ansible.builtin.command: kubectl apply -f {{ app_dir }}/k8s/logging/namespace.yaml
      register: logging_ns_result
      changed_when: "'created' in logging_ns_result.stdout or 'configured' in logging_ns_result.stdout"

    - name: Deploy Loki (Log Storage)
      ansible.builtin.command: kubectl apply -f {{ app_dir }}/k8s/logging/loki.yaml
      register: loki_result
      changed_when: "'created' in loki_result.stdout or 'configured' in loki_result.stdout"

    - name: Deploy Promtail (Log Collector)
      ansible.builtin.command: kubectl apply -f {{ app_dir }}/k8s/logging/promtail.yaml
      register: promtail_result
      changed_when: "'created' in promtail_result.stdout or 'configured' in promtail_result.stdout"

    # ------- Enable Metrics Server (Minikube) -------
    - name: Enable Minikube metrics-server addon (if using Minikube)
      ansible.builtin.command: minikube addons enable metrics-server
      failed_when: false

    # ------- Verify Deployment -------
    - name: Wait for pods to be ready
      ansible.builtin.command: sleep 20

    - name: Check turf-platform pods
      ansible.builtin.command: kubectl get pods -n turf-platform
      register: platform_pods
      changed_when: false

    - name: Check turf-databases pods
      ansible.builtin.command: kubectl get pods -n turf-databases
      register: database_pods
      changed_when: false

    - name: Check turf-infra pods
      ansible.builtin.command: kubectl get pods -n turf-infra
      register: infra_pods
      changed_when: false

    - name: Check monitoring pods
      ansible.builtin.command: kubectl get pods -n monitoring
      register: monitoring_pods
      changed_when: false

    - name: Check logging pods
      ansible.builtin.command: kubectl get pods -n logging
      register: logging_pods
      changed_when: false

    - name: Display deployment status
      ansible.builtin.debug:
        msg: |
          ========================================
          Kubernetes Deployment Complete!
          ========================================

          --- turf-platform (App Services) ---
          {{ platform_pods.stdout }}

          --- turf-databases (MongoDB, Redis) ---
          {{ database_pods.stdout }}

          --- turf-infra (Eureka) ---
          {{ infra_pods.stdout }}

          --- monitoring (Prometheus, Grafana) ---
          {{ monitoring_pods.stdout }}

          --- logging (Loki, Promtail) ---
          {{ logging_pods.stdout }}

          ========================================
          Access Points:
            Grafana:    http://<node-ip>:30030 (admin/admin)
            Prometheus: http://<node-ip>:30090
          ========================================

---
# ============================================================
# Playbook: deploy-k8s.yml
# Purpose:  Deploy the Turf Booking Platform microservices
#           to Kubernetes using the k8s_deploy Ansible Role.
#
# Features:
#   - Uses Ansible Vault for secret management
#   - Renders K8s Secrets from vault-encrypted variables
#   - Deploys via Kustomize (core services + HPA)
#   - Deploys monitoring (Prometheus + Grafana) and logging (Loki + Promtail)
#   - Verifies pod readiness and HPA status
#
# Usage:
#   ansible-playbook ansible/playbooks/deploy-k8s.yml \
#     --vault-password-file ansible/vault_password.txt
# ============================================================

- name: Deploy Turf Booking Platform to Kubernetes
  hosts: localhost
  connection: local
  become: false

  roles:
    - role: k8s_deploy

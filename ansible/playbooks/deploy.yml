---
# ============================================================
# Playbook: deploy.yml
# Purpose:  Deploy the Turf Booking Platform microservices
#           using Docker Compose on the target server.
# Usage:    ansible-playbook ansible/playbooks/deploy.yml
# ============================================================

- name: Deploy Turf Booking Platform (Microservices)
  hosts: webservers
  become: false

  vars:
    app_dir: "~/turf-booking"
    compose_file: docker-compose.prod.yml

  tasks:
    # ------- Prepare App Directory -------
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    # ------- Copy Deployment Files -------
    - name: Copy docker-compose.prod.yml to remote host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker-compose.prod.yml"
        dest: "{{ app_dir }}/docker-compose.prod.yml"
        mode: "0644"

    - name: Copy environment file to remote host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../.env"
        dest: "{{ app_dir }}/.env"
        mode: "0600"

    # ------- Ensure MongoDB Volume Exists -------
    - name: Ensure mongo volume exists
      ansible.builtin.command: docker volume create turf_mongodb_data
      register: volume_result
      changed_when: "'Created' in volume_result.stdout"
      failed_when: false

    # ------- Pull Latest Docker Images -------
    - name: Pull latest Docker images
      ansible.builtin.command: docker compose -f {{ compose_file }} pull --ignore-pull-failures
      args:
        chdir: "{{ app_dir }}"
      register: pull_result
      changed_when: "'Downloaded' in pull_result.stdout or 'Pull complete' in pull_result.stdout"
      failed_when: false

    # ------- Deploy the Application (rolling update, no downtime) -------
    - name: Start/Update application stack
      ansible.builtin.command: docker compose -f {{ compose_file }} up -d --remove-orphans
      args:
        chdir: "{{ app_dir }}"
      register: deploy_result
      changed_when: "'Started' in deploy_result.stdout or 'Created' in deploy_result.stdout"

    # ------- Verify Deployment -------
    - name: Wait for all containers to become healthy
      ansible.builtin.pause:
        seconds: 20

    - name: Check running containers
      ansible.builtin.command: docker compose -f {{ compose_file }} ps
      args:
        chdir: "{{ app_dir }}"
      register: container_status
      changed_when: false

    - name: Display deployment status
      ansible.builtin.debug:
        msg: |
          ========================================
          Deployment Complete!
          ========================================
          {{ container_status.stdout }}
          ========================================

    # ------- Seed Database (only if empty) -------
    - name: Check if database has been seeded
      ansible.builtin.command: >
        docker exec turf_mongodb mongosh --quiet --eval
        "db = db.getSiblingDB('turf_booking'); db.users.countDocuments()"
      register: user_count
      changed_when: false
      failed_when: false

    - name: Seed database with initial data
      ansible.builtin.command: >
        docker run --rm --network turf_network
        -e MONGO_URI=mongodb://mongodb:27017/turf_booking
        node:22-alpine sh -c
        "apk add --no-cache git && git clone https://github.com/prateekkumaryadav/Turf-Booking-Platform-Backend.git /app && cd /app && npm install --production mongoose bcryptjs dotenv && node seed.js"
      when: user_count.stdout is defined and user_count.stdout | trim == "0"
      register: seed_result
      failed_when: false

    - name: Display seed result
      ansible.builtin.debug:
        msg: "{{ seed_result.stdout | default('Database already seeded — skipping') }}"

    # ------- Health Checks -------
    - name: Verify API Gateway is responding
      ansible.builtin.uri:
        url: "http://localhost:5004"
        method: GET
        status_code: [200]
        timeout: 10
      register: gateway_health
      retries: 3
      delay: 5
      until: gateway_health is succeeded
      failed_when: false

    - name: Verify Auth Service is responding
      ansible.builtin.uri:
        url: "http://localhost:5001"
        method: GET
        status_code: [200]
        timeout: 10
      register: auth_health
      retries: 3
      delay: 5
      until: auth_health is succeeded
      failed_when: false

    - name: Verify Turf Service is responding
      ansible.builtin.uri:
        url: "http://localhost:5002"
        method: GET
        status_code: [200]
        timeout: 10
      register: turf_health
      retries: 3
      delay: 5
      until: turf_health is succeeded
      failed_when: false

    - name: Verify Booking Service is responding
      ansible.builtin.uri:
        url: "http://localhost:5003"
        method: GET
        status_code: [200]
        timeout: 10
      register: booking_health
      retries: 3
      delay: 5
      until: booking_health is succeeded
      failed_when: false

    - name: Verify Frontend is responding
      ansible.builtin.uri:
        url: "http://localhost:80"
        method: GET
        status_code: 200
        timeout: 10
      register: frontend_health
      retries: 3
      delay: 5
      until: frontend_health is succeeded
      failed_when: false

    - name: Display health check results
      ansible.builtin.debug:
        msg: |
          API Gateway:     {{ 'HEALTHY' if gateway_health is succeeded else 'UNHEALTHY' }}
          Auth Service:    {{ 'HEALTHY' if auth_health is succeeded else 'UNHEALTHY' }}
          Turf Service:    {{ 'HEALTHY' if turf_health is succeeded else 'UNHEALTHY' }}
          Booking Service: {{ 'HEALTHY' if booking_health is succeeded else 'UNHEALTHY' }}
          Frontend:        {{ 'HEALTHY' if frontend_health is succeeded else 'UNHEALTHY' }}

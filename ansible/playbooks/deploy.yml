---
# ============================================================
# Playbook: deploy.yml
# Purpose:  Deploy the Turf Booking Platform microservices
#           using Docker Compose via the docker_deploy Ansible Role.
#
# Features:
#   - Uses Ansible Vault for secret management
#   - Renders .env file from vault-encrypted variables
#   - Deploys via Docker Compose (production config)
#   - Runs health checks on all services
#
# Usage:
#   ansible-playbook ansible/playbooks/deploy.yml \
#     --vault-password-file ansible/vault_password.txt
# ============================================================

- name: Deploy Turf Booking Platform (Docker Compose)
  hosts: webservers
  become: false

  roles:
    - role: docker_deploy

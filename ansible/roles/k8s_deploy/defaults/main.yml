---
# ============================================================
# Role: k8s_deploy — Default Variables
# ============================================================

# Working directory for K8s manifests on the target host
k8s_app_dir: "~/turf-booking-k8s"

# Path to K8s manifests relative to the playbook
k8s_manifests_src: "{{ playbook_dir }}/../../k8s"

# Kubernetes namespace for the application
k8s_namespace: "{{ app_namespace | default('turf-platform') }}"

# Docker registry and image tag
docker_registry: "{{ app_docker_registry | default('prateekkumaryadav') }}"
image_tag: "{{ app_image_tag | default('latest') }}"

# Whether to deploy monitoring and logging stacks
deploy_monitoring: true
deploy_logging: true

# Whether to enable metrics-server (Minikube only)
enable_minikube_metrics: true

# Pod readiness wait time (seconds)
pod_ready_wait: 30

[defaults]
inventory = inventory/hosts.ini
remote_user = jenkins
private_key_file = ~/.ssh/id_rsa
host_key_checking = False
timeout = 30
retry_files_enabled = False
roles_path = roles
vault_password_file = vault_password.txt

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

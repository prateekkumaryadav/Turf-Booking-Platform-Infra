apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: turf-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: prateekkumaryadav/turf-auth-service:latest
        ports:
        - containerPort: 5001
        env:
        - name: PORT
          value: "5001"
        - name: MONGO_URI
          value: "mongodb://mongodb:27017/turf_booking"
        - name: CLIENT_URL
          value: ""
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: turf-platform
spec:
  selector:
    app: auth-service
  ports:
  - port: 5001
    targetPort: 5001

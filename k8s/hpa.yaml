# -----------------------------------------------------------
# Horizontal Pod Autoscalers — Turf Booking Platform
# -----------------------------------------------------------
# HPAs automatically scale pods based on CPU utilization.
# Requires metrics-server to be running in the cluster.
#   - Minikube: minikube addons enable metrics-server
#   - Cloud:    usually pre-installed
# -----------------------------------------------------------

# -----------------------------------------------------------
# API Gateway HPA — High traffic entry point
# -----------------------------------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: turf-platform
  labels:
    app: api-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: turf-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
      - name: booking-service
        image: prateekkumaryadav/turf-booking-service:latest
        ports:
        - containerPort: 5003
        env:
        - name: PORT
          value: "5003"
        - name: MONGO_URI
          value: "mongodb://mongodb:27017/turf_booking"
        - name: REDIS_URI
          value: "redis://redis:6379"
        envFrom:
        - secretRef:
            name: turf-app-secrets
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: turf-platform
spec:
  selector:
    app: booking-service
  ports:
  - port: 5003
    targetPort: 5003

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: turf-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: prateekkumaryadav/turf-api-gateway:latest
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:5001"
        - name: TURF_SERVICE_URL
          value: "http://turf-service:5002"
        - name: BOOKING_SERVICE_URL
          value: "http://booking-service:5003"
        envFrom:
        - secretRef:
            name: turf-app-secrets
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: turf-platform
spec:
  selector:
    app: api-gateway
  type: LoadBalancer
  ports:
  - port: 5004
    targetPort: 5000
